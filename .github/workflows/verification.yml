name: Verification

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  verify:
    name: Build and verify (macOS)
    runs-on: macos-latest

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install bison flex boost ccache
        echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH
        echo "/usr/local/opt/bison/bin"    >> $GITHUB_PATH

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-verify-macos-${{ github.sha }}
        restore-keys: |
          ccache-verify-macos-

    - name: Restore FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: fetchcontent-verify-macos-${{ hashFiles('CMakeLists.txt', 'engine-sim-bridge/CMakeLists.txt', 'test/CMakeLists.txt') }}
        restore-keys: |
          fetchcontent-verify-macos-

    - name: Configure
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: Smoke test binary
      run: |
        ./build/engine-sim-cli --sine --duration 1 --silent
        echo "Smoke test passed"

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: engine-sim-cli-macos
        path: |
          build/engine-sim-cli
          build/libenginesim.dylib
          build/libenginesim.1.dylib
        retention-days: 7
        make -C verification_tools test-input